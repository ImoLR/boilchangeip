name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: boil-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: boil-linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools binutils

      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "$TARGET"

      - name: Rename binary
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          cp "target/$TARGET/release/boil" "$ARTIFACT"
          chmod +x "$ARTIFACT"

      - name: Validate portable binary
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          "./$ARTIFACT" --version | tee version.txt
          grep -qx 'boil 2.1.2' version.txt

          if command -v ldd >/dev/null 2>&1; then
            ldd "./$ARTIFACT" | tee ldd.txt || true
            if grep -q 'libc\\.so\\|GLIBC_' ldd.txt; then
              echo "Binary unexpectedly depends on glibc" >&2
              exit 1
            fi
          fi

          readelf -l "./$ARTIFACT" | tee program-headers.txt
          if grep -q 'INTERP' program-headers.txt; then
            echo "Binary has a dynamic interpreter" >&2
            exit 1
          fi

          readelf -d "./$ARTIFACT" > dynamic-section.txt 2>&1 || true
          if grep -q 'NEEDED' dynamic-section.txt; then
            echo "Binary has dynamic dependencies" >&2
            cat dynamic-section.txt >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            artifacts/boil-linux-amd64 \
            artifacts/boil-linux-arm64 \
            --clobber
